<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<style>
   body {
    background-color: black;
    color:rgb(158, 182, 157);
    font: 1em sans-serif;
   }
   h1{
    color:beige;
     font: 1em sans-serif
   }

</style>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Como esta?</p>
    
    <script>
        var n1 = window.prompt("Digite um número")
        var n2 = window.prompt("Digite outro número")
        var s = Number(n1) + Number(n2) // conversão de string para número
        window.alert("A soma dos valores é " + s) // concatenação de strings
    </script>
</body>
